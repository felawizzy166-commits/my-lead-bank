<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lead Bank | Private Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script 
        async 
        crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_c_HMuZGV2JA" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
        type="text/javascript">
    </script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">

    <div id="auth-wall" class="flex flex-col items-center justify-center h-screen bg-gradient-to-b from-[#1e293b] to-[#0f172a]">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-extrabold text-blue-500 tracking-tight">LEAD BANK</h1>
            <p class="text-slate-400 mt-3 text-lg">Elite Digital Asset Management</p>
        </div>
        <div id="sign-in-ui" class="shadow-2xl rounded-2xl overflow-hidden bg-white"></div>
    </div>

    <div id="dashboard-app" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-[#1e293b] border-r border-slate-700 p-6 flex flex-col">
            <h1 class="text-2xl font-bold text-blue-500 mb-10">LEAD BANK</h1>
            <nav class="space-y-4 flex-1">
                <a href="#" class="block p-3 bg-blue-600 rounded-lg text-white font-bold">Dashboard</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg transition text-yellow-500 font-bold">Transfer Funds</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg transition">Statements</a>
            </nav>
            <div id="user-profile" class="mt-auto pt-6 border-t border-slate-700"></div>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold text-white">Accounts Overview</h2>
                <div class="text-green-400 font-bold">● System Secure</div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                    <p class="text-slate-400 text-sm font-bold uppercase">Available Balance</p>
                    <p class="text-5xl font-mono mt-3 text-white">$24,500.00</p>
                </div>
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                    <p class="text-slate-400 text-sm font-bold uppercase">Live Market (EUR)</p>
                    <p id="rate" class="text-5xl font-mono mt-3 text-blue-400">€0.92</p>
                </div>
            </div>

            <div class="bg-slate-800 rounded-2xl border border-slate-700 shadow-xl overflow-hidden">
                <div class="p-6 border-b border-slate-700 bg-slate-900">
                    <h3 class="font-bold text-white">Recent Activity</h3>
                </div>
                <div class="p-6 text-center text-slate-500 italic">No recent transactions to display</div>
            </div>
        </main>
    </div>

    <script>
      window.addEventListener('load', async function () {
        // Wait for Clerk to load
        await Clerk.load();

        if (Clerk.user) {
          // If logged in, hide blue screen and show bank
          document.getElementById('dashboard-app').classList.remove('hidden');
          document.getElementById('auth-wall').classList.add('hidden');
          Clerk.mountUserButton(document.getElementById('user-profile'));
        } else {
          // If NOT logged in, show the Sign In box
          Clerk.mountSignIn(document.getElementById('sign-in-ui'));
        }
      });
    </script>
</body>
</html>
