<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lead Bank | Online Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <nav class="p-6 border-b border-slate-700 flex justify-between">
        <h1 class="text-2xl font-bold text-blue-400">LEAD BANK</h1>
        <div class="space-x-4">
            <span>Welcome, User</span>
            <button class="bg-red-500 px-4 py-1 rounded">Logout</button>
        </div>
    </nav>

    <main class="p-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-slate-400">Total Balance</h2>
            <p class="text-4xl font-mono mt-2">$24,500.00</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-slate-400">Market Rate (USD/EUR)</h2>
            <p id="rate" class="text-4xl font-mono mt-2 text-green-400 font-bold">Loading...</p>
        </div>

        <div class="bg-blue-600 p-6 rounded-xl">
            <h2 class="font-bold">Need Help?</h2>
            <p class="text-sm mt-2">Use the live chat bubble in the corner to speak with our 24/7 support team.</p>
        </div>
    </main>

    </body>
</html>
